# Seat-monitor configuration, read by `csair report` via --config. Single source
# of truth for which routes/dates are watched and where snapshots live. Add a
# [[monitor.targets]] block per route+date.
[monitor]
snapshotDir = "data/monitor"

[[monitor.targets]]
from = "SFO"
to   = "CAN"
date = "2026-06-10"

[[monitor.targets]]
from = "SFO"
to   = "CAN"
date = "2026-06-14"

[[monitor.targets]]
from = "SFO"
to   = "CAN"
date = "2026-06-16"
flights = ["CZ660"]   # 1-stop through-flight SFO–WUH–CAN; tracked by flight key

[[monitor.targets]]
from = "SFO"
to   = "CAN"
date = "2026-06-17"   # nonstop CZ658 (default nonstop-only filter)

[[monitor.targets]]
from = "CAN"
to   = "SFO"
date = "2026-08-04"   # nonstop CZ657 (23:20 dep), CAN→SFO return of CZ658
