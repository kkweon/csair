name: seat-monitor

# Watches the routes/dates in monitor.toml for business-class seat availability
# and emails a STATUS digest — ONE combined email of the current business-class
# seat counts across all targets — four times a day (morning / lunch /
# afternoon / evening, PT) plus on manual dispatch. No diffing or snapshot
# commits; that path lives in `csair report diff` / report-mail.sh diff for
# manual/local use.
#
# The search/digest logic lives in the Go binary (`csair report`,
# internal/monitor, unit-tested); report-mail.sh just mints the token and ships
# the body. Routes/dates are configured in monitor.toml, not here.
#
# PREREQUISITE: confirm a runner can mint the anti-bot token (probe-token). If
# the WAF blocks the runner, use the local-cron fallback (CSAIR_LOCAL_EMAIL=1).
#
# Required repo secrets: GMAIL_USER, GMAIL_APP_PASSWORD, NOTIFY_TO. Optional: NOTIFY_CC.

on:
  schedule:
    # Status digest at 08:17 / 12:17 / 16:17 / 20:17 America/Los_Angeles
    # (morning / lunch / afternoon / evening). The :17 minute avoids the
    # congested top-of-hour (GitHub may delay schedule runs under load); the
    # timezone field is DST-aware, so these stay at local PT year-round.
    - cron: "17 8 * * *"
      timezone: "America/Los_Angeles"
    - cron: "17 12 * * *"
      timezone: "America/Los_Angeles"
    - cron: "17 16 * * *"
      timezone: "America/Los_Angeles"
    - cron: "17 20 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:        # runs a status digest now

permissions:
  contents: read

concurrency:
  group: seat-monitor
  cancel-in-progress: false

jobs:
  # Current-status digest: one combined email of business seats across all
  # targets. Runs on every schedule slot (08/12/16/20 PT) and on manual dispatch.
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: browser-actions/setup-chrome@v2
        id: chrome
      - name: Resolve Chrome
        run: |
          CHROME="${{ steps.chrome.outputs.chrome-path }}"
          [ -n "$CHROME" ] || CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser)"
          echo "CSAIR_CHROME=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version
      - name: Build
        run: go build -o csair .
      - name: Report (status)
        id: run
        run: scripts/report-mail.sh status
      - name: Send email
        if: steps.run.outputs.email == 'true'
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: csair monitor <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.NOTIFY_TO }}
          cc: ${{ secrets.NOTIFY_CC }}
          subject: ${{ steps.run.outputs.subject }}
          body: file://${{ steps.run.outputs.body_file }}
